[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Redirect all routes that don't match a file to 404
[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404

# Cache hashed assets for 1 year
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache pagefind assets
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
