# pnpm settings (pnpm 11 reads these here, not .npmrc/package.json)
nodeLinker: hoisted
enablePrePostScripts: true
verifyDepsBeforeRun: false
# Run dependency build/install scripts (like yarn's default). pnpm 11 otherwise
# treats ignored build scripts as a FATAL error under CI. The theme's deps
# (sharp, esbuild) are trusted; they ship prebuilt binaries but pnpm still gates them.
dangerouslyAllowAllBuilds: true
