name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to gh-pages
    runs-on: ubuntu-latest
    permissions:
      # Needed for peaceiris to push the built site to the gh-pages branch.
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build site
        run: yarn build
        env:
          ASTRO_SITE: ${{ vars.ASTRO_SITE || 'https://seungjong-ha.github.io' }}
          ASTRO_BASE: ${{ vars.ASTRO_BASE || '' }}

      # Publish dist/ to the gh-pages branch, served by GitHub Pages via
      # "Deploy from a branch" — no Pages-source change needed. .nojekyll keeps
      # Astro's _s/ assets from being stripped by Jekyll.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
