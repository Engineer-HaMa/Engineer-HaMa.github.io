name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy to gh-pages
    runs-on: ubuntu-latest
    permissions:
      # Needed for peaceiris to push the built site to the gh-pages branch.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          # User/org page: origin only, empty base. Override via repo variables if needed.
          ASTRO_SITE: ${{ vars.ASTRO_SITE || 'https://engineer-hama.github.io' }}
          ASTRO_BASE: ${{ vars.ASTRO_BASE || '' }}

      # Publish the built dist/ to the gh-pages branch, which GitHub Pages
      # serves via "Deploy from a branch". Adds .nojekyll so Astro's _s/ assets
      # are not stripped by Jekyll. force_orphan keeps gh-pages a single clean commit.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
