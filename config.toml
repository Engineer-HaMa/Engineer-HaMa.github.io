# The URL the site will be built for
base_url = "https://engineer-hama.github.io"

title = "HaMa"
description = "SeungJong Ha's personal page"

theme = "kodama-theme"
default_language = "ko"

compile_sass = false
build_search_index = false

[markdown.highlighting]
enabled = true
theme = "dracula"

[slugify]
paths = "on"
taxonomies = "on"
anchors = "safe"

# ── Korean (default language) UI labels ────────────────────────────
[translations]
Biography = "소개"
Interests = "관심 분야"
Education = "학력"
toc = "목차"
Published = "게시일"
Abstract = "초록"

# ── English secondary language ─────────────────────────────────────
[languages.en]
title = "HaMa"

[languages.en.translations]
Biography = "About"
Interests = "Interests"
Education = "Education"
toc = "Table of Contents"
Published = "Published"
Abstract = "Abstract"

[extra]
# Avatar / favicon shown on the landing page (project static overrides the theme default)
avatar = "img/profile.jpg"
favicon = "img/profile.jpg"

email = "seungjong.ha@casys.kaist.ac.kr"

# Landing page stays focused on the biography (no contact block)
contact_in_index = false

# Show the ko ⇄ en language toggle in the nav
language_codes = ["ko", "en"]
menu_items = []

# Per-language overrides for the English site
[extra.en]
contact_in_index = false
menu_items = []
